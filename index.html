<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groundwater Arsenic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .info.legend {
            background: white;
            padding: 10px;
            line-height: 20px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/geoblaze"></script>

    <script>
        // Set up the map container
        const map = L.map('map').setView([0, 0], 2);
        
        // Add base layer map
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Objects to store raster references
        const loadedRasters = {};
        let activeLayerName = 'Prediction 1984-2000';

        // Set up the dynamic legend control
        const legend = L.control({ position: 'bottomright' });
        
        legend.onAdd = function () {
            this._div = L.DomUtil.create('div', 'info legend');
            this.update(activeLayerName);
            return this._div;
        };

        legend.update = function (layerName) {
            let html = `<strong>${layerName}</strong><br>`;
            if (layerName === 'Change Map') {
                html += '<i style="background: rgb(0,255,0)"></i> -50 (Decrease)<br>';
                html += '<i style="background: rgb(255,255,0)"></i> 0<br>';
                html += '<i style="background: rgb(255,0,0)"></i> +50 (Increase)<br>';
            } else {
                html += '<i style="background: rgb(255,255,0)"></i> 0 &mu;g/L<br>';
                html += '<i style="background: rgb(255,128,0)"></i> 50 &mu;g/L<br>';
                html += '<i style="background: rgb(255,0,0)"></i> 100 &mu;g/L<br>';
            }
            this._div.innerHTML = html;
        };
        
        legend.addTo(map);

        // Color mapping for Maps 1 and 2 (0 to 100: Yellow to Red)
        function getYellowRedColor(val) {
            if (val < 0) val = 0;
            if (val > 100) val = 100;
            const ratio = val / 100;
            const g = Math.floor(255 * (1 - ratio));
            return `rgba(255, ${g}, 0, 0.75)`;
        }

        // Color mapping for Map 3 (-50 to 50: Green to Yellow to Red)
        function getGreenYellowRedColor(val) {
            if (val < -50) val = -50;
            if (val > 50) val = 50;
            
            if (val < 0) {
                const ratio = (val + 50) / 50; 
                const r = Math.floor(255 * ratio);
                return `rgba(${r}, 255, 0, 0.75)`;
            } else {
                const ratio = val / 50; 
                const g = Math.floor(255 * (1 - ratio));
                return `rgba(255, ${g}, 0, 0.75)`;
            }
        }

        // Parse and render raster files
        function createRasterLayer(url, colorFn, layerName, isDefault) {
            return fetch(url)
                .then(res => res.arrayBuffer())
                .then(buffer => parseGeoraster(buffer))
                .then(georaster => {
                    loadedRasters[layerName] = georaster;

                    const layer = new GeoRasterLayer({
                        georaster: georaster,
                        opacity: 0.8,
                        pixelValuesToColorFn: values => {
                            const pixelVal = values[0];
                            if (pixelVal === null || pixelVal === undefined || pixelVal === georaster.noDataValue || isNaN(pixelVal)) {
                                return null;
                            }
                            return colorFn(pixelVal);
                        },
                        resolution: 128
                    });

                    if (isDefault) {
                        layer.addTo(map);
                        map.fitBounds(layer.getBounds());
                    }
                    return layer;
                });
        }

        // Define exact file paths
        const path1 = 'prediction_with_84-00 predictor data.tif';
        const path2 = 'prediction_with_00-22 predictor data.tif';
        const path3 = 'change map.tif';

        // Initialize layers
        Promise.all([
            createRasterLayer(path1, getYellowRedColor, 'Prediction 1984-2000', true),
            createRasterLayer(path2, getYellowRedColor, 'Prediction 2000-2022', false),
            createRasterLayer(path3, getGreenYellowRedColor, 'Change Map', false)
        ]).then(([layer1, layer2, layer3]) => {
            
            const baseLayers = {
                "Prediction 1984-2000": layer1,
                "Prediction 2000-2022": layer2,
                "Change Map": layer3
            };

            L.control.layers(baseLayers, null, { collapsed: false }).addTo(map);

            // Handle layer changes, force canvas redraw, and update the legend panel
            map.on('baselayerchange', function(e) {
                activeLayerName = e.name;
                legend.update(e.name);
                if (e.layer && typeof e.layer.redraw === 'function') {
                    e.layer.redraw();
                }
            });
        }).catch(err => console.error("Error reading data files:", err));

        // Click listener to sample all layers simultaneously
        map.on('click', function(e) {
            const coordinates = [e.latlng.lng, e.latlng.lat];

            function getPixelValue(raster) {
                if (!raster) return "No Data";
                try {
                    const queryResult = geoblaze.identify(raster, coordinates);
                    if (queryResult && queryResult.length > 0) {
                        const finalVal = queryResult[0];
                        if (finalVal !== null && finalVal !== raster.noDataValue && !isNaN(finalVal)) {
                            return `${finalVal.toFixed(2)} &mu;g/L`;
                        }
                    }
                } catch (err) {
                    console.error("Error querying point:", err);
                }
                return "No Data";
            }

            const currentVal = getPixelValue(loadedRasters['Prediction 1984-2000']);
            const futureVal = getPixelValue(loadedRasters['Prediction 2000-2022']);
            const changeVal = getPixelValue(loadedRasters['Change Map']);

            const latStr = e.latlng.lat.toFixed(5);
            const lngStr = e.latlng.lng.toFixed(5);

            const popupContent = `
                <strong>Arsenic concentration</strong><br><br>
                Arsenic concentration (current) = ${currentVal}<br>
                Arsenic concentration (future) = ${futureVal}<br>
                Arsenic concentration change = ${changeVal}<br><br>
                Latitude: ${latStr}<br>
                Longitude: ${lngStr}
            `;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupContent)
                .openOn(map);
        });
    </script>
</body>
</html>
