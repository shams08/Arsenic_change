<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groundwater Arsenic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .custom-control {
            background: white;
            padding: 12px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 14px;
            line-height: 22px;
            color: #333;
        }
        .custom-control strong {
            display: block;
            margin-bottom: 6px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .info.legend {
            background: white;
            padding: 10px;
            line-height: 20px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/proj4"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/geoblaze"></script>

    <script>
        // Set up the map container
        const map = L.map('map').setView([10.37, 105.75], 10);
        
        // Add English language base layer map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Objects to store raster references and layer instances
        const loadedRasters = {};
        const mapLayers = {};
        let activeLayerName = 'Prediction 1984-2000';

        // Register common projections for data alignment
        proj4.defs("EPSG:32648", "+proj=utm +zone=48 +datum=WGS84 +units=m +no_defs");

        // Set up the dynamic legend control
        const legend = L.control({ position: 'bottomright' });
        
        legend.onAdd = function () {
            this._div = L.DomUtil.create('div', 'info legend');
            this.update(activeLayerName);
            return this._div;
        };

        legend.update = function (layerName) {
            if (layerName === 'Base Map Only') {
                this._div.style.display = 'none';
                return;
            }
            this._div.style.display = 'block';
            let html = `<strong>${layerName}</strong><br>`;
            if (layerName === 'Change Map') {
                html += '<i style="background: rgb(0,255,0)"></i> -50 (Decrease)<br>';
                html += '<i style="background: rgb(255,255,0)"></i> 0<br>';
                html += '<i style="background: rgb(255,0,0)"></i> +50 (Increase)<br>';
            } else {
                html += '<i style="background: rgb(255,255,0)"></i> 0 &#181;g/L<br>';
                html += '<i style="background: rgb(255,128,0)"></i> 50 &#181;g/L<br>';
                html += '<i style="background: rgb(255,0,0)"></i> 100 &#181;g/L<br>';
            }
            this._div.innerHTML = html;
        };
        
        legend.addTo(map);

        // Color mapping for Maps 1 and 2 (0 to 100: Yellow to Red)
        function getYellowRedColor(val) {
            if (val < 0) val = 0;
            if (val > 100) val = 100;
            const ratio = val / 100;
            const g = Math.floor(255 * (1 - ratio));
            return `rgba(255, ${g}, 0, 1.0)`;
        }

        // Color mapping for Map 3 (-50 to 50: Green to Yellow to Red)
        function getGreenYellowRedColor(val) {
            if (val < -50) val = -50;
            if (val > 50) val = 50;
            
            if (val < 0) {
                const ratio = (val + 50) / 50; 
                const r = Math.floor(255 * ratio);
                return `rgba(${r}, 255, 0, 1.0)`;
            } else {
                const ratio = val / 50; 
                const g = Math.floor(255 * (1 - ratio));
                return `rgba(255, ${g}, 0, 1.0)`;
            }
        }

        // Parse and render raster files
        function createRasterLayer(url, colorFn, layerName, isDefault) {
            return fetch(url)
                .then(res => res.arrayBuffer())
                .then(buffer => parseGeoraster(buffer))
                .then(georaster => {
                    loadedRasters[layerName] = georaster;

                    const layer = new GeoRasterLayer({
                        georaster: georaster,
                        opacity: 1.0,
                        pixelValuesToColorFn: values => {
                            const pixelVal = values[0];
                            if (pixelVal === null || pixelVal === undefined || pixelVal === georaster.noDataValue || isNaN(pixelVal)) {
                                return null;
                            }
                            return colorFn(pixelVal);
                        },
                        resolution: 128
                    });

                    mapLayers[layerName] = layer;

                    if (isDefault) {
                        layer.addTo(map);
                        map.fitBounds(layer.getBounds());
                    }
                    return layer;
                });
        }

        // Define exact file paths
        const path1 = 'prediction_with_84-00 predictor data.tif';
        const path2 = 'prediction_with_00-22 predictor data.tif';
        const path3 = 'change map.tif';

        // Initialize layers and build custom control box
        Promise.all([
            createRasterLayer(path1, getYellowRedColor, 'Prediction 1984-2000', true),
            createRasterLayer(path2, getYellowRedColor, 'Prediction 2000-2022', false),
            createRasterLayer(path3, getGreenYellowRedColor, 'Change Map', false)
        ]).then(() => {
            
            // Create a custom UI control box to prevent canvas overlapping bugs
            const customControl = L.control({ position: 'topright' });
            customControl.onAdd = function() {
                const div = L.DomUtil.create('div', 'custom-control');
                div.innerHTML = `
                    <strong>Layer Options</strong>
                    <label><input type="radio" name="layer-toggle" value="Prediction 1984-2000" checked> Prediction 1984-2000</label><br>
                    <label><input type="radio" name="layer-toggle" value="Prediction 2000-2022"> Prediction 2000-2022</label><br>
                    <label><input type="radio" name="layer-toggle" value="Change Map"> Change Map</label><br>
                    <label><input type="radio" name="layer-toggle" value="Base Map Only"> Base Map Only</label>
                `;
                
                // Prevent map clicks from triggering when clicking inside the menu container
                L.DomEvent.disableClickPropagation(div);
                return div;
            };
            customControl.addTo(map);

            // Listen for radio selection updates
            document.addEventListener('change', function(event) {
                if (event.target.name === 'layer-toggle') {
                    const selectedName = event.target.value;
                    activeLayerName = selectedName;
                    legend.update(selectedName);

                    // Remove all data layers explicitly
                    for (let key in mapLayers) {
                        if (map.hasLayer(mapLayers[key])) {
                            map.removeLayer(mapLayers[key]);
                        }
                    }

                    // Add only the requested data layer back to the container
                    if (selectedName !== 'Base Map Only' && mapLayers[selectedName]) {
                        mapLayers[selectedName].addTo(map);
                    }
                }
            });

        }).catch(err => console.error("Error reading data files:", err));

        // Coordinate space projection checker
        function getNativeCoordinates(georaster, lng, lat) {
            if (!georaster) return null;

            // Test standard WGS84 mapping first
            if (lng >= georaster.xmin && lng <= georaster.xmax && lat >= georaster.ymin && lat <= georaster.ymax) {
                return [lng, lat];
            }

            // Test Web Mercator projection matching next
            try {
                const p3857 = proj4("EPSG:4326", "EPSG:3857", [lng, lat]);
                if (p3857[0] >= georaster.xmin && p3857[0] <= georaster.xmax && p3857[1] >= georaster.ymin && p3857[1] <= georaster.ymax) {
                    return p3857;
                }
            } catch (e) {}

            // Test regional UTM Zone 48N grid system mapping
            try {
                const p32648 = proj4("EPSG:4326", "EPSG:32648", [lng, lat]);
                if (p32648[0] >= georaster.xmin && p32648[0] <= georaster.xmax && p32648[1] >= georaster.ymin && p32648[1] <= georaster.ymax) {
                    return p32648;
                }
            } catch (e) {}

            // Check if native projection identifier matches known definitions
            if (georaster.projection) {
                try {
                    const targetProj = typeof georaster.projection === 'number' ? "EPSG:" + georaster.projection : georaster.projection;
                    const pCustom = proj4("EPSG:4326", targetProj, [lng, lat]);
                    if (pCustom[0] >= georaster.xmin && pCustom[0] <= georaster.xmax && pCustom[1] >= georaster.ymin && pCustom[1] <= georaster.ymax) {
                        return pCustom;
                    }
                } catch (e) {}
            }

            return null;
        }

        // Click listener to extract matched points from all profiles
        map.on('click', function(e) {
            const lng = e.latlng.lng;
            const lat = e.latlng.lat;

            function getPixelValue(raster) {
                if (!raster) return "No Data";
                try {
                    const nativeCoords = getNativeCoordinates(raster, lng, lat);
                    if (!nativeCoords) return "No Data";

                    const queryResult = geoblaze.identify(raster, nativeCoords);
                    if (queryResult && queryResult.length > 0) {
                        const finalVal = queryResult[0];
                        if (finalVal !== null && finalVal !== raster.noDataValue && !isNaN(finalVal)) {
                            return `${finalVal.toFixed(2)} &#181;g/L`;
                        }
                    }
                } catch (err) {
                    console.error("Error querying location point:", err);
                }
                return "No Data";
            }

            const currentVal = getPixelValue(loadedRasters['Prediction 1984-2000']);
            const futureVal = getPixelValue(loadedRasters['Prediction 2000-2022']);
            const changeVal = getPixelValue(loadedRasters['Change Map']);

            const latStr = lat.toFixed(5);
            const lngStr = lng.toFixed(5);

            const popupContent = `
                <strong>Arsenic concentration</strong><br><br>
                Arsenic concentration (current) = ${currentVal}<br>
                Arsenic concentration (future) = ${futureVal}<br>
                Arsenic concentration change = ${changeVal}<br><br>
                Latitude: ${latStr}<br>
                Longitude: ${lngStr}
            `;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupContent)
                .openOn(map);
        });
    </script>
</body>
</html>
